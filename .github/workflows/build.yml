name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf automake autoconf-archive libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            libtool-bin

      - name: Install buildozer
        run: |
          pip install --user buildozer
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Pre-accept Android SDK licenses
        run: |
          mkdir -p ~/.android
          echo "### User Accepted License ###" > ~/.android/repositories.cfg
          # 创建 licenses 目录并写入常见许可证哈希（让 sdkmanager 跳过交互）
          mkdir -p ~/.android/licenses
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > ~/.android/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > ~/.android/licenses/android-sdk-preview-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" > ~/.android/licenses/intel-android-extra-license
          echo "33b6a2b64607f11b759f320ef9dff4ae5c47d97a" > ~/.android/licenses/google-gdk-license

      - name: Build with buildozer
        run: |
          # 如果 Buildozer 已经下载了 SDK，手动接受所有许可证并安装 build-tools
          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          if [ -f "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
            SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
            yes | $SDKMANAGER --licenses || true
            $SDKMANAGER "build-tools;37.0.0" || true
          elif [ -f "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" ]; then
            SDKMANAGER="$ANDROID_SDK_ROOT/tools/bin/sdkmanager"
            yes | $SDKMANAGER --licenses || true
            $SDKMANAGER "build-tools;37.0.0" || true
          else
            echo "sdkmanager not found, Buildozer will install it automatically"
          fi
          # 现在运行 Buildozer
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-reminder-app
          path: bin/*.apk
